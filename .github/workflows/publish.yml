name: Publish
on:
  release:
    types: [published]

jobs:
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for JSR OIDC publishing
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"
      - name: Publish to JSR
        run: deno publish
